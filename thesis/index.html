<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SUCRe optimization viewer</title>
<style>
  html, body { margin: 0; height: 100%; background: #ffffff; overflow: hidden;
                font-family: system-ui, sans-serif; }
  #app { position: relative; width: 100%; height: 100%; }
  #ui { position: absolute; left: 50%; bottom: 12px; transform: translateX(-50%);
        max-width: calc(100vw - 32px); box-sizing: border-box;
        padding: 8px 16px 8px 8px; background: rgba(20, 22, 28, 0.72);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        color: #eee; display: flex; align-items: center; gap: 12px; font-size: 13px;
        border-radius: 999px;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.22), 0 1px 2px rgba(0, 0, 0, 0.14);
        user-select: none; }
  #ui button { background: rgba(255, 255, 255, 0.08); color: #eee; border: 0;
               border-radius: 50%; width: 30px; height: 30px; padding: 0; cursor: pointer;
               font-size: 12px; display: inline-flex; align-items: center;
               justify-content: center; flex: 0 0 auto; transition: background 150ms; }
  #ui button:hover { background: rgba(255, 255, 255, 0.18); }
  #frame { -webkit-appearance: none; appearance: none;
           flex: 0 1 280px; min-width: 80px; height: 22px;
           margin: 0; background: transparent; cursor: pointer; }
  #frame::-webkit-slider-runnable-track {
    height: 4px; border-radius: 2px;
    background: linear-gradient(to right,
      #f5f5f5 0%, #f5f5f5 var(--progress, 0%),
      rgba(255, 255, 255, 0.20) var(--progress, 0%), rgba(255, 255, 255, 0.20) 100%); }
  #frame::-moz-range-track { height: 4px; border-radius: 2px;
                             background: rgba(255, 255, 255, 0.20); }
  #frame::-moz-range-progress { height: 4px; border-radius: 2px; background: #f5f5f5; }
  #frame::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 8px; height: 18px;
    border-radius: 3px; background: #fff; margin-top: -7px;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5); cursor: grab;
    transition: transform 120ms, box-shadow 120ms; }
  #frame:hover::-webkit-slider-thumb { transform: scaleY(1.1); }
  #frame::-webkit-slider-thumb:active { cursor: grabbing;
    transform: scaleY(1.15); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.55); }
  #frame::-moz-range-thumb {
    width: 8px; height: 18px; border-radius: 3px; background: #fff; border: 0;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.5); cursor: grab;
    transition: transform 120ms, box-shadow 120ms; }
  #frame:hover::-moz-range-thumb { transform: scaleY(1.1); }
  #frame::-moz-range-thumb:active { cursor: grabbing;
    transform: scaleY(1.15); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.55); }
  #phase { font-variant-numeric: tabular-nums; font-size: 11px; opacity: 0.75;
           white-space: nowrap; flex: 0 0 auto; text-align: right; }
  #view-toggle { position: absolute; top: 16px; right: 16px; background: rgba(0, 0, 0, .6);
                 color: #eee; border: 0; border-radius: 4px; padding: 8px 14px; cursor: pointer;
                 font-size: 13px; font-family: inherit; }
  #view-toggle:hover { background: rgba(0, 0, 0, .8); }
  #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #555; font-size: 14px; text-align: center; min-width: 260px; }
  #loading-msg { font-variant-numeric: tabular-nums; }
  #progress-track { width: 260px; height: 6px; background: #e5e5e5; margin: 14px auto 0;
                    border-radius: 3px; overflow: hidden; }
  #progress-fill { width: 0%; height: 100%; background: #5588cc; transition: width .2s linear; }
</style>
</head>
<body>
<div id="app">
  <div id="status">
    <div id="loading-msg">Loading 0%</div>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>
  <button id="view-toggle" title="Toggle reconstruction / illumination view" hidden>Show illumination</button>
  <div id="ui" hidden>
    <button id="play" title="Play / pause">&#9654;</button>
    <input id="frame" type="range" min="0" max="1" value="0" step="1">
    <span id="phase"></span>
  </div>
</div>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
}}
</script>
<script type="module" src="viewer.js"></script>
</body>
</html>
